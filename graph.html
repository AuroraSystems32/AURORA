<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURORA Blueprint 3D System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
      <link rel="icon" type="image/png" href="AURORA.jpg">
  <style>
    :root {
      --bg-base: #020617;
      --panel-bg: rgba(15, 23, 42, 0.65);
      --text-main: #f8fafc;
      --text-dim: #94a3b8;
      --accent: #10b981; 
      --accent-glow: rgba(16, 185, 129, 0.2);
      --border: rgba(255, 255, 255, 0.1);
      --font-family: 'Inter', sans-serif;
      --bg-image: none;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--bg-base);
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      color: var(--text-main);
      font-family: var(--font-family);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .noise, .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .noise {
      opacity: 0.07;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.25) 0 0.8px, transparent 1px),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.18) 0 0.8px, transparent 1px),
        radial-gradient(circle at 40% 60%, rgba(255,255,255,0.14) 0 0.8px, transparent 1px);
      background-size: 17px 17px, 23px 23px, 29px 29px;
      mix-blend-mode: screen;
      animation: drift 12s linear infinite;
    }

    .scanlines {
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02) 0px,
        rgba(255,255,255,0.02) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.2;
    }

    @keyframes drift {
      from { transform: translateY(0px); }
      to { transform: translateY(20px); }
    }

    .hud {
      position: absolute;
      inset: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      pointer-events: none;
    }

    .topbar {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 22px;
      border-radius: 12px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 32px);
      letter-spacing: 3px;
      font-weight: 600;
      line-height: 1;
    }

    .brand .accent { color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }

    .brand p {
      margin: 0;
      color: var(--text-dim);
      font-size: clamp(10px, 1vw, 12px);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    .status {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      font-size: 13px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status strong { color: var(--text-main); font-weight: 700; }
    .online { color: var(--accent) !important; text-shadow: 0 0 10px var(--accent-glow); }

    .footer {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      pointer-events: none;
    }

    .chip {
      pointer-events: auto;
      padding: 12px 16px;
      border-radius: 8px;
      background: var(--panel-bg);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
    }

    .hint strong { color: var(--accent); }

    .reticle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(48vw, 48vh);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      box-shadow: 0 0 60px var(--accent-glow), inset 0 0 40px rgba(0,0,0,0.2);
      pointer-events: none;
    }

    .reticle::before, .reticle::after {
      content: "";
      position: absolute;
      inset: 8%;
      border: 1px dashed var(--border);
      border-radius: 50%;
    }

    .reticle::after {
      inset: 22%;
      border-style: solid;
      border-color: rgba(255, 255, 255, 0.03);
    }

    @media (max-width: 700px) {
      .hud { inset: 12px; }
      .topbar { padding: 14px 16px; flex-direction: column; text-align: center; }
      .status { font-size: 11px; gap: 10px; justify-content: center; margin-top: 10px;}
      .footer { flex-direction: column; align-items: stretch; text-align: center;}
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene"></canvas>
    <div class="reticle"></div>
    <div class="noise"></div>
    <div class="scanlines"></div>

    <div class="hud">
      <div class="topbar">
        <div class="brand">
          <h1>AU<span class="accent">RO</span>RA</h1>
          <p>Autonomous User-Responsive Operations & Resources Assistant</p>
        </div>
        <div class="status">
          <span>OP: <strong id="opName">COMMANDER</strong></span>
          <span>SYS: <strong class="online">ONLINE</strong></span>
          <span>MODE: <strong>BLUEPRINT</strong></span>
        </div>
      </div>

      <div class="footer">
        <div class="chip">ANIMATED PROCEDURAL 3D GEOMETRY</div>
        <div class="chip hint">PRESS <strong>F</strong> FOR FULLSCREEN</div>
      </div>
    </div>
  </div>

  <script>
    // --- LOAD AURORA CONFIGURATION ---
    const config = JSON.parse(localStorage.getItem('aurora_config')) || { name: 'OPERATOR', color: '#10b981', bgUrl: '', font: "'Inter', sans-serif", matrix: false };

    function hexToRgbVals(hex) {
        let h = hex.replace('#', '');
        if(h.length === 3) h = h.split('').map(x => x+x).join('');
        return { r: parseInt(h.substring(0,2), 16), g: parseInt(h.substring(2,4), 16), b: parseInt(h.substring(4,6), 16) };
    }
    
    const accentRgb = hexToRgbVals(config.color);
    
    // Apply config styling to the DOM
    const root = document.documentElement;
    root.style.setProperty('--accent', config.color);
    root.style.setProperty('--accent-glow', `rgba(${accentRgb.r}, ${accentRgb.g}, ${accentRgb.b}, 0.2)`);
    root.style.setProperty('--font-family', config.font);
    root.style.setProperty('--bg-image', config.bgUrl ? `url('${config.bgUrl}')` : 'none');
    document.getElementById('opName').innerText = config.name.toUpperCase();

    // --- CANVAS LOGIC ---
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');
    const app = document.getElementById('app');

    let w = 0, h = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);
    let time = 0;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = window.innerWidth;
      h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    const baseVerts = [];
    const edges = [];

    function generateShape() {
      baseVerts.length = 0;
      edges.length = 0;

      const shapeType = Math.floor(Math.random() * 4);
      const ringCount = 3 + Math.floor(Math.random() * 4);
      const pointsPerRing = 8 + Math.floor(Math.random() * 9);
      const height = 110 + Math.random() * 90;
      const radiusBase = 90 + Math.random() * 80;

      if (shapeType === 0) {
        for (let y = -ringCount; y <= ringCount; y++) {
          const t = y / ringCount;
          const radius = radiusBase * (1 - Math.abs(t) * (0.25 + Math.random() * 0.25));
          for (let i = 0; i < pointsPerRing; i++) {
            const a = (i / pointsPerRing) * Math.PI * 2;
            baseVerts.push({ x: Math.cos(a) * radius, y: t * height, z: Math.sin(a) * radius, seed: i + y * 11 });
          }
        }
      } else if (shapeType === 1) {
        for (let y = -ringCount; y <= ringCount; y++) {
          const t = y / ringCount;
          const twist = t * Math.PI * (0.8 + Math.random() * 1.8);
          const radius = radiusBase * (0.7 + Math.sin((t + 1) * Math.PI) * 0.35);
          for (let i = 0; i < pointsPerRing; i++) {
            const a = (i / pointsPerRing) * Math.PI * 2 + twist;
            baseVerts.push({ x: Math.cos(a) * radius, y: t * height, z: Math.sin(a) * radius, seed: i + y * 13 });
          }
        }
      } else if (shapeType === 2) {
        for (let y = -ringCount; y <= ringCount; y++) {
          const t = y / ringCount;
          const loopOffset = Math.sin(t * Math.PI) * radiusBase * 0.45;
          const radius = radiusBase * (0.45 + Math.cos(t * Math.PI * 0.5) * 0.35);
          for (let i = 0; i < pointsPerRing; i++) {
            const a = (i / pointsPerRing) * Math.PI * 2;
            baseVerts.push({
              x: Math.cos(a) * radius + Math.cos(t * Math.PI * 2) * loopOffset,
              y: t * height * 0.7,
              z: Math.sin(a) * radius + Math.sin(t * Math.PI * 2) * loopOffset,
              seed: i + y * 17
            });
          }
        }
      } else {
        for (let y = -ringCount; y <= ringCount; y++) {
          const t = y / ringCount;
          const radius = radiusBase * (1 - Math.abs(t));
          const finalRadius = Math.max(14, radius);
          for (let i = 0; i < pointsPerRing; i++) {
            const a = (i / pointsPerRing) * Math.PI * 2;
            baseVerts.push({ x: Math.cos(a) * finalRadius, y: t * height * 1.25, z: Math.sin(a) * finalRadius, seed: i + y * 19 });
          }
        }
      }

      const totalRings = ringCount * 2 + 1;
      for (let r = 0; r < totalRings; r++) {
        for (let i = 0; i < pointsPerRing; i++) {
          const current = r * pointsPerRing + i;
          const next = r * pointsPerRing + ((i + 1) % pointsPerRing);
          edges.push([current, next]);
          if (r < totalRings - 1) {
            edges.push([current, current + pointsPerRing]);
            edges.push([current, (r + 1) * pointsPerRing + ((i + 1) % pointsPerRing)]);
          }
        }
      }
    }

    generateShape();

    function rotate(v, ax, ay, az) {
      let { x, y, z } = v;

      let cy = Math.cos(ay), sy = Math.sin(ay);
      let x1 = x * cy - z * sy;
      let z1 = x * sy + z * cy;
      x = x1; z = z1;

      let cx = Math.cos(ax), sx = Math.sin(ax);
      let y1 = y * cx - z * sx;
      let z2 = y * sx + z * cx;
      y = y1; z = z2;

      let cz = Math.cos(az), sz = Math.sin(az);
      let x2 = x * cz - y * sz;
      let y2 = x * sz + y * cz;
      x = x2; y = y2;

      return { x, y, z };
    }

    function project(v) {
      const camZ = 520;
      const scale = camZ / (camZ + v.z);
      return {
        x: v.x * scale + w / 2,
        y: v.y * scale + h / 2,
        scale,
        depth: v.z
      };
    }

    function drawGrid(t) {
      ctx.save();
      ctx.lineWidth = 1;

      for (let i = 0; i < 24; i++) {
        const y = ((i * 52 + (t * 80)) % (h + 100)) - 50;
        ctx.strokeStyle = `rgba(${accentRgb.r}, ${accentRgb.g}, ${accentRgb.b}, 0.04)`;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      for (let i = 0; i < 32; i++) {
        const x = i * (w / 31);
        ctx.strokeStyle = `rgba(${accentRgb.r}, ${accentRgb.g}, ${accentRgb.b}, 0.02)`;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      ctx.restore();
    }

    function draw() {
      time += 0.016;
      ctx.clearRect(0, 0, w, h);

      drawGrid(time);

      const ax = time * 0.45;
      const ay = time * 0.65;
      const az = Math.sin(time * 0.5) * 0.25;

      const verts = baseVerts.map((v, idx) => {
        const pulse = 1 + Math.sin(time * 2 + idx * 0.18) * 0.08;
        const warped = {
          x: v.x * pulse,
          y: v.y + Math.sin(time * 1.8 + v.seed) * 8,
          z: v.z * pulse
        };
        return project(rotate(warped, ax, ay, az));
      });

      // outer glow using aurora color
      ctx.save();
      for (const [a, b] of edges) {
        const va = verts[a], vb = verts[b];
        const alpha = Math.max(0.02, ((va.scale + vb.scale) * 0.5) * 0.18);
        ctx.strokeStyle = `rgba(${accentRgb.r}, ${accentRgb.g}, ${accentRgb.b}, ${alpha})`;
        ctx.lineWidth = Math.max(1, (va.scale + vb.scale) * 1.2);
        ctx.beginPath();
        ctx.moveTo(va.x, va.y);
        ctx.lineTo(vb.x, vb.y);
        ctx.stroke();
      }
      ctx.restore();

      // crisp wireframe
      ctx.save();
      for (const [a, b] of edges) {
        const va = verts[a], vb = verts[b];
        const alpha = Math.max(0.08, ((va.scale + vb.scale) * 0.5) * 0.6);
        ctx.strokeStyle = `rgba(${accentRgb.r}, ${accentRgb.g}, ${accentRgb.b}, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(va.x, va.y);
        ctx.lineTo(vb.x, vb.y);
        ctx.stroke();
      }

      for (const v of verts) {
        const r = Math.max(1.1, v.scale * 2.2);
        ctx.fillStyle = `rgba(255,255,255,${Math.max(0.2, v.scale * 0.7)})`;
        ctx.beginPath();
        ctx.arc(v.x, v.y, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(${accentRgb.r}, ${accentRgb.g}, ${accentRgb.b}, ${Math.max(0.1, v.scale * 0.4)})`;
        ctx.beginPath();
        ctx.arc(v.x, v.y, r * 2.4, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();

      // center pulse using aurora color
      const pulse = 20 + Math.sin(time * 3) * 6;
      const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, pulse * 5);
      grad.addColorStop(0, `rgba(${accentRgb.r}, ${accentRgb.g}, ${accentRgb.b}, 0.22)`);
      grad.addColorStop(0.35, `rgba(${accentRgb.r}, ${accentRgb.g}, ${accentRgb.b}, 0.08)`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(w/2, h/2, pulse * 5, 0, Math.PI * 2);
      ctx.fill();

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (err) {
        console.warn('Fullscreen not available:', err);
      }
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'f') {
        e.preventDefault();
        toggleFullscreen();
      }
      if (key === 'r') {
        e.preventDefault();
        generateShape();
      }
    });

    window.addEventListener('dblclick', () => {
      generateShape();
    });
  </script>
</body>
</html>
