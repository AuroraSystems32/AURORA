<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURORA - System Initializing</title>

<link rel="icon" type="image/png" href="AURORA.jpg">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", sans-serif;
  background: #050b18;
  color: #cfe8ff;
}

/* Top Bar */
.topbar {
  padding: 20px 30px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  letter-spacing: 4px;
  font-weight: 600;
}

.logo span {
  color: #10b981;
}

.status {
  font-size: 13px;
  opacity: 0.7;
}

/* Layout */
.wrapper {
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

/* Cards */
.card {
  background: rgba(10, 20, 40, 0.6);
  border: 1px solid rgba(0,255,170,0.15);
  border-radius: 14px;
  padding: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(0,255,170,0.05);
}

.card h3 {
  font-size: 14px;
  letter-spacing: 1px;
  margin-bottom: 15px;
  color: #7fffd4;
}

/* Terminal box */
.terminal {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 10px;
  font-family: monospace;
  font-size: 13px;
  color: #8affc1;
  line-height: 1.6;
}

/* Loader */
.loader {
  margin-top: 15px;
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
}

.loader-bar {
  height: 100%;
  width: 40%;
  background: linear-gradient(90deg, #00f7a8, #00cfff);
  animation: loading 4s infinite ease-in-out;
}

@keyframes loading {
  0% { transform: translateX(-100%); }
  50% { transform: translateX(50%); }
  100% { transform: translateX(200%); }
}

/* Center message */
.center {
  text-align: center;
  padding-top: 30px;
}

.big {
  font-size: 28px;
  letter-spacing: 3px;
  margin-bottom: 10px;
}

.sub {
  opacity: 0.6;
  font-size: 14px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">AU<span>RO</span>RA</div>
  <div class="status">SYS: OFFLINE | MODE: NULL</div>
</div>

<div class="wrapper">


  <!-- System Status -->
  <div class="card center">
    <h3>SYSTEM STATUS</h3>
    <div class="big">UNDER CONSTRUCTION</div>
    <div class="sub">Core systems are being constructed</div>
  </div>



</div>

<div class="footer">
  © 2026 AURORA Systems
</div>

</body>
</html>
